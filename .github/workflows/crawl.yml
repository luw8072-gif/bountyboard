name: Crawl Bounties
on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:  # Manual trigger

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch bounties
        run: |
          python3 -m pip install requests
          python3 scripts/crawl.py
      - name: Commit updates
        run: |
          git config user.name "BountyBot"
          git config user.email "bot@bountyboard.dev"
          git add data/
          git diff --staged --quiet || git commit -m "Update: $(date -u +%Y-%m-%dT%H:%M)"
          git push
